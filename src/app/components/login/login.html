<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%; border-radius: 1rem;">
    
    <div class="text-center mb-4">
      <h3 class="fw-bold text-primary">Iniciar Sesión</h3>
      <p class="text-muted small">Accede a tu panel de control</p>
    </div>

    <div class="mb-3">
      <label class="form-label small fw-bold">Correo Electrónico</label>
      <input 
        type="email" 
        class="form-control form-control-lg" 
        [ngModel]="email()" 
        (ngModelChange)="email.set($event)"
        placeholder="nombre@correo.com">
    </div>

    <div class="mb-4">
      <label class="form-label small fw-bold">Contraseña</label>
      <input 
        type="password" 
        class="form-control form-control-lg" 
        [ngModel]="password()" 
        (ngModelChange)="password.set($event)"
        placeholder="••••••••">
    </div>

    <button 
      (click)="onLogin()" 
      class="btn btn-primary btn-lg w-100 shadow-sm"
      [disabled]="cargando()">
      
      @if (cargando()) {
        <span class="spinner-border spinner-border-sm me-2"></span>
        Validando...
      } @else {
        Entrar
      }
    </button>

    @if (mensaje()) {
      <div class="alert mt-3 py-2 text-center" 
           [class.alert-danger]="mensaje().includes('❌')" 
           [class.alert-success]="mensaje().includes('✅')">
        {{ mensaje() }}
      </div>
    }

  </div>
</div>
